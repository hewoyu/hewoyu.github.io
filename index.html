<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>hewoyu</title>

    <style>
        * {
            padding: 0;
            margin: 0;
            text-decoration: none;
        }
        /*文字上面少横杠，去掉多一横杠*/

        body {                                            /*中间小型方块的排练*/
            background-color: rgb(107, 128, 159);         /*背景的颜色*/
            display: flex;
            justify-content: space-evenly;
            height: 100vh;
            /*页面高度*/
            align-items: center;
        /*    方框位置center/中心*/

        }


        .shell {
            width: 100px;
            height: 700px;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            background-color: rgb(17, 24, 39);
            border-radius: 10px;
            transition: .3s;
            overflow: hidden;
        }
        /*从左数第0个方框*/

        .box {
            display: block;
            height: 15%;
            width: 80%;
            margin: 9px;
            border-radius: 5px;
            position: relative;
            transition: .3s;
            color: rgb(199, 183, 183);
        }
        /*文字的原本颜色*/
        .box i {
            font-size: 60px;
            position: absolute;
            margin: 7px 0 0 13px;
        }

        .box:nth-child(1)::before,
        /*中间的横线*/
        .box:nth-child(5)::before{
            content: '';
            display: block;
            width: 100%;
            height: 2px;
            background-color: rgb(55, 65, 81);
            position: absolute;
            bottom: -10px;
        }

        .box span{
            position: relative;
            top: 22px;
            /*字体向下移*/
            left: 60px;
            /*从左向又移，数越大越靠左*/
            font: 500 20px '';
            /*字体的大小*/
            opacity: 0;
            /*展开时文字从透明到不透明*/
            transition: .1s;
        /*    时间的快慢*/
        }
        .shell:hover{
            width: 270px;
        }
        /*方框展开*/
        .box:hover{
            background-color: rgb(63, 63, 64);
        }
        /*选择文字时方框的颜色*/
        .shell:hover span{
            opacity: 1;
        }
        /*文字显示*/
        .box:hover{
            color: #1a1717;
        }
        /*鼠标移到文字变色*/
    </style>
</head>

    <body>
    <div class="shell">
        <a href="#" class="box"><i class="iconfont icon-liebiao"></i><span>灰原哀</span></a>
        <a href="#" class="box"><i class="iconfont icon-cangku"></i><span>hewoyu</span></a>

    </div>
    <body>

    </html>
