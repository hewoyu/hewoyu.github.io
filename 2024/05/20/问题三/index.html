>181</span><br><span class="line">182</span><br><span class="line">183</span><br><span class="line">184</span><br><span class="line">185</span><br><span class="line">186</span><br><span class="line">187</span><br><span class="line">188</span><br><span class="line">189</span><br><span class="line">190</span><br><span class="line">191</span><br><span class="line">192</span><br><span class="line">193</span><br><span class="line">194</span><br><span class="line">195</span><br><span class="line">196</span><br><span class="line">197</span><br><span class="line">198</span><br><span class="line">199</span><br><span class="line">200</span><br><span class="line">201</span><br><span class="line">202</span><br><span class="line">203</span><br><span class="line">204</span><br><span class="line">205</span><br><span class="line">206</span><br><span class="line">207</span><br><span class="line">208</span><br><span class="line">209</span><br><span class="line">210</span><br><span class="line">211</span><br><span class="line">212</span><br><span class="line">213</span><br><span class="line">214</span><br><span class="line">215</span><br><span class="line">216</span><br><span class="line">217</span><br><span class="line">218</span><br><span class="line">219</span><br><span class="line">220</span><br><span class="line">221</span><br><span class="line">222</span><br><span class="line">223</span><br><span class="line">224</span><br><span class="line">225</span><br><span class="line">226</span><br><span class="line">227</span><br><span class="line">228</span><br><span class="line">229</span><br><span class="line">230</span><br><span class="line">231</span><br><span class="line">232</span><br><span class="line">233</span><br><span class="line">234</span><br><span class="line">235</span><br><span class="line">236</span><br><span class="line">237</span><br><span class="line">238</span><br><span class="line">239</span><br><span class="line">240</span><br><span class="line">241</span><br><span class="line">242</span><br><span class="line">243</span><br><span class="line">244</span><br><span class="line">245</span><br><span class="line">246</span><br><span class="line">247</span><br><span class="line">248</span><br><span class="line">249</span><br><span class="line">250</span><br><span class="line">251</span><br><span class="line">252</span><br><span class="line">253</span><br><span class="line">254</span><br><span class="line">255</span><br><span class="line">256</span><br><span class="line">257</span><br><span class="line">258</span><br><span class="line">259</span><br><span class="line">260</span><br></pre></td><td class="code"><pre><span class="line"></span><br><span class="line">import pandas as pd  </span><br><span class="line">import numpy as np  </span><br><span class="line">import pywt  </span><br><span class="line">  </span><br><span class="line"></span><br><span class="line">train_data = pd.read_excel(&#x27;附件1EMR.xlsx&#x27;)  # 这里读入数据  </span><br><span class="line">  </span><br><span class="line">  </span><br><span class="line"></span><br><span class="line">def extract_wavelet_features(data, column_name=&#x27;电磁辐射 (EMR)&#x27;, scales=np.arange(1, 4), wavelet=&#x27;cmor&#x27;):  </span><br><span class="line">    # 计算小波变换系数  </span><br><span class="line">    emr_values = data[column_name].values  </span><br><span class="line">    coefficients, frequencies = pywt.cwt(emr_values, scales, wavelet)  </span><br><span class="line">  </span><br><span class="line">    # 计算各种小波特征  </span><br><span class="line">    scale_energies = np.sum(np.abs(coefficients) ** 2, axis=0)  </span><br><span class="line">    scale_means = np.mean(np.abs(coefficients), axis=0)  </span><br><span class="line">    scale_stds = np.std(np.abs(coefficients), axis=0)  </span><br><span class="line">    scale_max = np.max(np.abs(coefficients), axis=0)  </span><br><span class="line">    scale_min = np.min(np.abs(coefficients), axis=0)  </span><br><span class="line">    scale_median = np.median(np.abs(coefficients), axis=0)  </span><br><span class="line">    scale_ptp = np.ptp(np.abs(coefficients), axis=0)  </span><br><span class="line">    total_energy = np.sum(np.abs(coefficients) ** 2, axis=0) + 1e-10  </span><br><span class="line">    scale_energy_ratios = np.abs(coefficients) ** 2 / total_energy  </span><br><span class="line">  </span><br><span class="line">    # 将所有特征汇总到一个特征矩阵中  </span><br><span class="line">    features = np.column_stack(  </span><br><span class="line">        [scale_energies, scale_means, scale_stds, scale_max, scale_min, scale_median, scale_ptp] + [np.abs(coeff) for  </span><br><span class="line">                                                                                                    coeff in  </span><br><span class="line">                                                                                                    scale_energy_ratios])  </span><br><span class="line">    feature_names = [&#x27;energy&#x27;, &#x27;mean&#x27;, &#x27;std&#x27;, &#x27;max&#x27;, &#x27;min&#x27;, &#x27;median&#x27;, &#x27;ptp&#x27;] + [f&#x27;energy_ratio_scale_&#123;i + 1&#125;&#x27; for i in  </span><br><span class="line">                                                                                range(scale_energy_ratios.shape[0])]  </span><br><span class="line">    return pd.DataFrame(features, columns=feature_names)  </span><br><span class="line">  </span><br><span class="line">  </span><br><span class="line">def process_wavelet_features(data, column_name=&#x27;电磁辐射 (EMR)&#x27;, scales=np.arange(1, 4), wavelet=&#x27;cmor&#x27;):  </span><br><span class="line">    # 提取小波特征  </span><br><span class="line">    wavelet_df = extract_wavelet_features(data, column_name, scales, wavelet)  </span><br><span class="line">  </span><br><span class="line">    # 计算时间间隔特征  </span><br><span class="line">    data[&#x27;时间间隔 (interval)&#x27;] = data[&#x27;时间 (time)&#x27;].diff().dt.total_seconds().fillna(0)  </span><br><span class="line">  </span><br><span class="line">    # 合并小波特征和原有DataFrame  </span><br><span class="line">    full_df = pd.concat([data, wavelet_df], axis=1)  </span><br><span class="line">  </span><br><span class="line">    # 创建时间基特征  </span><br><span class="line">    full_df[&#x27;时间 (time)&#x27;] = pd.to_datetime(full_df[&#x27;时间 (time)&#x27;])  </span><br><span class="line">    full_df[&#x27;hour&#x27;] = full_df[&#x27;时间 (time)&#x27;].dt.hour  </span><br><span class="line">    full_df[&#x27;day_of_week&#x27;] = full_df[&#x27;时间 (time)&#x27;].dt.dayofweek  </span><br><span class="line">    full_df[&#x27;rolling_mean&#x27;] = full_df[column_name].rolling(window=10, min_periods=1).mean()  </span><br><span class="line">    full_df[&#x27;rolling_max&#x27;] = full_df[column_name].rolling(window=10, min_periods=1).max()  </span><br><span class="line">    full_df[&#x27;rolling_min&#x27;] = full_df[column_name].rolling(window=10, min_periods=1).min()  </span><br><span class="line">  </span><br><span class="line">    return full_df  </span><br><span class="line">  </span><br><span class="line">  </span><br><span class="line"></span><br><span class="line">train_data = process_wavelet_features(train_data)  </span><br><span class="line"></span><br><span class="line">train_data  </span><br><span class="line"></span><br><span class="line">from sklearn.preprocessing import LabelEncoder  </span><br><span class="line">  </span><br><span class="line"># 假设已经有一个LabelEncoder实例le，并且已经用它来转换了full_df[&#x27;类别 (class)&#x27;]# 转换类别标签为数值  </span><br><span class="line">le = LabelEncoder()  </span><br><span class="line">train_data[&#x27;类别 (class)&#x27;] = le.fit_transform(train_data[&#x27;类别 (class)&#x27;])  </span><br><span class="line">  </span><br><span class="line"># 查看标签和编码的对应关系  </span><br><span class="line">label_mapping = dict(zip(le.classes_, range(len(le.classes_))))  </span><br><span class="line">  </span><br><span class="line"># 打印每个标签及其对应的数字编码  </span><br><span class="line">for label, code in label_mapping.items():  </span><br><span class="line">    print(f&#x27;Label: &#123;label&#125; -&gt; Code: &#123;code&#125;&#x27;)  </span><br><span class="line"></span><br><span class="line">train_data  </span><br><span class="line"></span><br><span class="line">train_data.shape  </span><br><span class="line"></span><br><span class="line">data = train_data  </span><br><span class="line"></span><br><span class="line">import torch  </span><br><span class="line">import torch.nn as nn  </span><br><span class="line">import torch.optim as optim  </span><br><span class="line">from sklearn.model_selection import train_test_split  </span><br><span class="line">from sklearn.preprocessing import StandardScaler  </span><br><span class="line">import pandas as pd  </span><br><span class="line">  </span><br><span class="line"># 1. 数据加载和预处理  </span><br><span class="line"># 假设 data 是一个 pandas DataFramefeatures = data.drop([&#x27;类别 (class)&#x27;, &#x27;时间 (time)&#x27;], axis=1).values  </span><br><span class="line">labels = data[&#x27;类别 (class)&#x27;].values  </span><br><span class="line">  </span><br><span class="line"># 数据标准化  </span><br><span class="line">scaler = StandardScaler()  </span><br><span class="line">features = scaler.fit_transform(features)  </span><br><span class="line">  </span><br><span class="line"># 划分训练集和测试集  </span><br><span class="line">X_train, X_test, y_train, y_test = train_test_split(features, labels, test_size=0.2, random_state=42)  </span><br><span class="line">  </span><br><span class="line"># 转换为PyTorch张量  </span><br><span class="line">X_train = torch.tensor(X_train, dtype=torch.float32)  </span><br><span class="line">X_test = torch.tensor(X_test, dtype=torch.float32)  </span><br><span class="line">y_train = torch.tensor(y_train, dtype=torch.long)  </span><br><span class="line">y_test = torch.tensor(y_test, dtype=torch.long)  </span><br><span class="line">  </span><br><span class="line">  </span><br><span class="line"># 2. 构建模型  </span><br><span class="line">class BPNetwork(nn.Module):  </span><br><span class="line">    def __init__(self, input_dim, hidden_dim, output_dim):  </span><br><span class="line">        super(BPNetwork, self).__init__()  </span><br><span class="line">        self.fc1 = nn.Linear(input_dim, hidden_dim)  </span><br><span class="line">        self.relu = nn.ReLU()  </span><br><span class="line">        self.fc2 = nn.Linear(hidden_dim, output_dim)  </span><br><span class="line">        self.log_softmax = nn.LogSoftmax(dim=1)  # 使用log-softmax  </span><br><span class="line">  </span><br><span class="line">    def forward(self, x):  </span><br><span class="line">        x = self.fc1(x)  </span><br><span class="line">        x = self.relu(x)  </span><br><span class="line">        x = self.fc2(x)  </span><br><span class="line">        x = self.log_softmax(x)  # 使用log-softmax代替softmax  </span><br><span class="line">        return x  </span><br><span class="line">  </span><br><span class="line">  </span><br><span class="line">input_dim = X_train.shape[1]  </span><br><span class="line">hidden_dim = 64  # 可以根据需要调整  </span><br><span class="line">output_dim = len(set(labels))  # 类别数量  </span><br><span class="line">model = BPNetwork(input_dim, hidden_dim, output_dim)  </span><br><span class="line">  </span><br><span class="line"># 3. 定义损失函数和优化器  </span><br><span class="line">criterion = nn.NLLLoss()  # 使用NLLLoss  </span><br><span class="line">optimizer = optim.Adam(model.parameters(), lr=0.001)  </span><br><span class="line">  </span><br><span class="line"># 4. 训练模型  </span><br><span class="line">num_epochs = 40  # 根据需要调整  </span><br><span class="line">for epoch in range(num_epochs):  </span><br><span class="line">    optimizer.zero_grad()  </span><br><span class="line">    outputs = model(X_train)  </span><br><span class="line">    loss = criterion(outputs, y_train)  </span><br><span class="line">    loss.backward()  </span><br><span class="line">    optimizer.step()  </span><br><span class="line"> s="line">121</span><br><span class="line">122</span><br><span class="line">123</span><br><span class="line">124</span><br><span class="line">125</span><br><span class="line">126</span><br><span class="line">127</span><br><span class="line">128</span><br><span class="line">129</span><br><span class="line">130</span><br><span class="line">131</span><br><span class="line">132</span><br><span class="line">133</span><br><span class="line">134</span><br><span class="line">135</span><br><span class="line">136</span><br><span class="line">137</span><br><span class="line">138</span><br><span class="line">139</span><br><span class="line">140</span><br><span class="line">141</span><br><span class="line">142</span><br><span class="line">143</span><br><span class="line">144</span><br><span class="line">145</span><br><span class="line">146</span><br><span class="line">147</span><br><span class="line">148</span><br><span class="line">149</span><br><span class="line">150</span><br><span class="line">151</span><br><span class="line">152</span><br><span class="line">153</span><br><span class="line">154</span><br><span class="line">155</span><br><span class="line">156</span><br><span class="line">157</span><br><span class="line">158</span><br><span class="line">159</span><br><span class="line">160</span><br><span class="line">161</span><br><span class="line">162</span><br><span class="line">163</span><br><span class="line">164</span><br><span class="line">165</span><br><span class="line">166</span><br><span class="line">167</span><br><span class="line">168</span><br><span class="line">169</span><br><span class="line">170</span><br><span class="line">171</span><br><span class="line">172</span><br><span class="line">173</span><br><span class="line">174</span><br><span class="line">175</span><br><span class="line">176</span><br><span class="line">177</span><br><span class="line">178</span><br><span class="line">179</span><br><span class="line">180</span><br><span class="line">181</span><br><span class="line">182</span><br><span class="line">183</span><br><span class="line">184</span><br><span class="line">185</span><br><span class="line">186</span><br><span class="line">187</span><br><span class="line">188</span><br><span class="line">189</span><br><span class="line">190</span><br><span class="line">191</span><br><span class="line">192</span><br><span class="line">193</span><br><span class="line">194</span><br><span class="line">195</span><br><span class="line">196</span><br><span class="line">197</span><br><span class="line">198</span><br><span class="line">199</span><br><span class="line">200</span><br><span class="line">201</span><br><span class="line">202</span><br><span class="line">203</span><br><span class="line">204</span><br><span class="line">205</span><br><span class="line">206</span><br><span class="line">207</span><br><span class="line">208</span><br><span class="line">209</span><br><span class="line">210</span><br><span class="line">211</span><br><span class="line">212</span><br><span class="line">213</span><br><span class="line">214</span><br><span class="line">215</span><br><span class="line">216</span><br><span class="line">217</span><br><span class="line">218</span><br><span class="line">219</span><br><span class="line">220</span><br><span class="line">221</span><br><span class="line">222</span><br><span class="line">223</span><br><span class="line">224</span><br><span class="line">225</span><br><span class="line">226</span><br><span class="line">227</span><br><span class="line">228</span><br><span class="line">229</span><br><span class="line">230</span><br><span class="line">231</span><br><span class="line">232</span><br><span class="line">233</span><br><span class="line">234</span><br><span class="line">235</span><br><span class="line">236</span><br><span class="line">237</span><br><span class="line">238</span><br><span class="line">239</span><br><span class="line">240</span><br><span class="line">241</span><br><span class="line">242</span><br><span class="line">243</span><br><span class="line">244</span><br></pre></td><td class="code"><pre><span class="line"></span><br><span class="line">import pandas as pd  </span><br><span class="line">import numpy as np  </span><br><span class="line">import pywt  </span><br><span class="line"></span><br><span class="line">train_data  = pd.read_excel(&#x27;附件1AE.xlsx&#x27;) # 这里读入数据  </span><br><span class="line"></span><br><span class="line">def extract_wavelet_features(data, column_name=&#x27;声波强度 (AE)&#x27;, scales=np.arange(1, 4), wavelet=&#x27;cmor&#x27;):  </span><br><span class="line">    # 计算小波变换系数  </span><br><span class="line">    emr_values = data[column_name].values  </span><br><span class="line">    coefficients, frequencies = pywt.cwt(emr_values, scales, wavelet)  </span><br><span class="line">      </span><br><span class="line">    # 计算各种小波特征  </span><br><span class="line">    scale_energies = np.sum(np.abs(coefficients)**2, axis=0)  </span><br><span class="line">    scale_means = np.mean(np.abs(coefficients), axis=0)  </span><br><span class="line">    scale_stds = np.std(np.abs(coefficients), axis=0)  </span><br><span class="line">    scale_max = np.max(np.abs(coefficients), axis=0)  </span><br><span class="line">    scale_min = np.min(np.abs(coefficients), axis=0)  </span><br><span class="line">    scale_median = np.median(np.abs(coefficients), axis=0)  </span><br><span class="line">    scale_ptp = np.ptp(np.abs(coefficients), axis=0)  </span><br><span class="line">    total_energy = np.sum(np.abs(coefficients)**2, axis=0) + 1e-10  </span><br><span class="line">    scale_energy_ratios = np.abs(coefficients)**2 / total_energy  </span><br><span class="line">  </span><br><span class="line">    # 将所有特征汇总到一个特征矩阵中  </span><br><span class="line">    features = np.column_stack([scale_energies, scale_means, scale_stds, scale_max, scale_min, scale_median, scale_ptp] + [np.abs(coeff) for coeff in scale_energy_ratios])  </span><br><span class="line">    feature_names = [&#x27;energy&#x27;, &#x27;mean&#x27;, &#x27;std&#x27;, &#x27;max&#x27;, &#x27;min&#x27;, &#x27;median&#x27;, &#x27;ptp&#x27;] + [f&#x27;energy_ratio_scale_&#123;i+1&#125;&#x27; for i in range(scale_energy_ratios.shape[0])]  </span><br><span class="line">    return pd.DataFrame(features, columns=feature_names)  </span><br><span class="line">  </span><br><span class="line">  </span><br><span class="line">def process_wavelet_features(data, column_name=&#x27;声波强度 (AE)&#x27;, scales=np.arange(1, 4), wavelet=&#x27;cmor&#x27;):  </span><br><span class="line">    # 提取小波特征  </span><br><span class="line">    wavelet_df = extract_wavelet_features(data, column_name, scales, wavelet)  </span><br><span class="line">      </span><br><span class="line">    # 计算时间间隔特征  </span><br><span class="line">    data[&#x27;时间间隔 (interval)&#x27;] = data[&#x27;时间 (time)&#x27;].diff().dt.total_seconds().fillna(0)  </span><br><span class="line">      </span><br><span class="line">    # 合并小波特征和原有DataFrame  </span><br><span class="line">    full_df = pd.concat([data, wavelet_df], axis=1)  </span><br><span class="line">      </span><br><span class="line">    # 创建时间基特征  </span><br><span class="line">    full_df[&#x27;时间 (time)&#x27;] = pd.to_datetime(full_df[&#x27;时间 (time)&#x27;])  </span><br><span class="line">    full_df[&#x27;hour&#x27;] = full_df[&#x27;时间 (time)&#x27;].dt.hour  </span><br><span class="line">    full_df[&#x27;day_of_week&#x27;] = full_df[&#x27;时间 (time)&#x27;].dt.dayofweek  </span><br><span class="line">    full_df[&#x27;rolling_mean&#x27;] = full_df[column_name].rolling(window=10, min_periods=1).mean()  </span><br><span class="line">    full_df[&#x27;rolling_max&#x27;] = full_df[column_name].rolling(window=10, min_periods=1).max()  </span><br><span class="line">    full_df[&#x27;rolling_min&#x27;] = full_df[column_name].rolling(window=10, min_periods=1).min()  </span><br><span class="line">      </span><br><span class="line">    return full_df  </span><br><span class="line"></span><br><span class="line">train_data = process_wavelet_features(train_data)  </span><br><span class="line"></span><br><span class="line">from sklearn.preprocessing import LabelEncoder  </span><br><span class="line"># 假设已经有一个LabelEncoder实例le，并且已经用它来转换了full_df[&#x27;类别 (class)&#x27;]# 转换类别标签为数值  </span><br><span class="line">le = LabelEncoder()  </span><br><span class="line">train_data[&#x27;类别 (class)&#x27;] = le.fit_transform(train_data[&#x27;类别 (class)&#x27;])  </span><br><span class="line">  </span><br><span class="line"># 查看标签和编码的对应关系  </span><br><span class="line">label_mapping = dict(zip(le.classes_, range(len(le.classes_))))  </span><br><span class="line">  </span><br><span class="line"># 打印每个标签及其对应的数字编码  </span><br><span class="line">for label, code in label_mapping.items():  </span><br><span class="line">    print(f&#x27;Label: &#123;label&#125; -&gt; Code: &#123;code&#125;&#x27;)  </span><br><span class="line"></span><br><span class="line">data = train_data  </span><br><span class="line"></span><br><span class="line">import torch  </span><br><span class="line">import torch.nn as nn  </span><br><span class="line">import torch.optim as optim  </span><br><span class="line">from sklearn.model_selection import train_test_split  </span><br><span class="line">from sklearn.preprocessing import StandardScaler  </span><br><span class="line">import pandas as pd  </span><br><span class="line">  </span><br><span class="line"># 1. 数据加载和预处理  </span><br><span class="line"># 假设 data 是一个 pandas DataFramefeatures = data.drop([&#x27;类别 (class)&#x27;, &#x27;时间 (time)&#x27;], axis=1).values  </span><br><span class="line">labels = data[&#x27;类别 (class)&#x27;].values  </span><br><span class="line">  </span><br><span class="line"># 数据标准化  </span><br><span class="line">scaler = StandardScaler()  </span><br><span class="line">features = scaler.fit_transform(features)  </span><br><span class="line">  </span><br><span class="line"># 划分训练集和测试集  </span><br><span class="line">X_train, X_test, y_train, y_test = train_test_split(features, labels, test_size=0.2, random_state=42)  </span><br><span class="line">  </span><br><span class="line"># 转换为PyTorch张量  </span><br><span class="line">X_train = torch.tensor(X_train, dtype=torch.float32)  </span><br><span class="line">X_test = torch.tensor(X_test, dtype=torch.float32)  </span><br><span class="line">y_train = torch.tensor(y_train, dtype=torch.long)  </span><br><span class="line">y_test = torch.tensor(y_test, dtype=torch.long)  </span><br><span class="line">  </span><br><span class="line"># 2. 构建模型  </span><br><span class="line">class BPNetwork(nn.Module):  </span><br><span class="line">    def __init__(self, input_dim, hidden_dim, output_dim):  </span><br><span class="line">        super(BPNetwork, self).__init__()  </span><br><span class="line">        self.fc1 = nn.Linear(input_dim, hidden_dim)  </span><br><span class="line">        self.relu = nn.ReLU()  </span><br><span class="line">        self.fc2 = nn.Linear(hidden_dim, output_dim)  </span><br><span class="line">        self.log_softmax = nn.LogSoftmax(dim=1)  # 使用log-softmax  </span><br><span class="line">  </span><br><span class="line">    def forward(self, x):  </span><br><span class="line">        x = self.fc1(x)  </span><br><span class="line">        x = self.relu(x)  </span><br><span class="line">        x = self.fc2(x)  </span><br><span class="line">        x = self.log_softmax(x)  # 使用log-softmax代替softmax  </span><br><span class="line">        return x  </span><br><span class="line">  </span><br><span class="line">input_dim = X_train.shape[1]  </span><br><span class="line">hidden_dim = 32  # 可以根据需要调整  </span><br><span class="line">output_dim = len(set(labels))  # 类别数量  </span><br><span class="line">model = BPNetwork(input_dim, hidden_dim, output_dim)  </span><br><span class="line">  </span><br><span class="line"># 3. 定义损失函数和优化器  </span><br><span class="line">criterion = nn.NLLLoss()  # 使用NLLLoss  </span><br><span class="line">optimizer = optim.Adam(model.parameters(), lr=0.001)  </span><br><span class="line">  </span><br><span class="line"># 4. 训练模型  </span><br><span class="line">num_epochs = 40  # 根据需要调整  </span><br><span class="line">for epoch in range(num_epochs):  </span><br><span class="line">    optimizer.zero_grad()  </span><br><span class="line">    outputs = model(X_train)  </span><br><span class="line">    loss = criterion(outputs, y_train)  </span><br><span class="line">    loss.backward()  </span><br><span class="line">    optimizer.step()  </span><br><span class="line">  </span><br><span class="line">    if (epoch + 1) % 5 == 0:  </span><br><span class="line">        print(f&#x27;Epoch [&#123;epoch+1&#125;/&#123;num_epochs&#125;], Loss: &#123;loss.item():.4f&#125;&#x27;)  </span><br><span class="line">  </span><br><span class="line"># 5. 评估模型  </span><br><span class="line">model.eval()  </span><br><span class="line">with torch.no_grad():  </span><br><span class="line">    outputs = model(X_test)  </span><br><span class="line">    probabilities = torch.exp(outputs)  # 通过取指数获得概率  </span><br><span class="line">    predicted_labels = torch.argmax(probabilities, dim=1)  </span><br><span class="line">    accuracy = (predicted_labels == y_test).sum().item() / len(y_test)  </span><br><span class="line">    print(f&#x27;Test Accuracy: &#123;accuracy:.4f&#125;&#x27;)  </span><br><span class="line">#     # 打印每个样本的类别概率  </span><br><span class="line">#     for i, probs in enumerate(probabilities):  </span><br><span class="line">#         print(f&#x27;Sample &#123;i&#125;: &#123;probs.numpy()&#125;&#x27;)  </span><br><span class="line">  </span><br><span class="line"></span><br><span class="line"># 假设模型已被训练并保存在变量 model 中  </span><br><span class="line">model.eval()  </span><br><span class="line">  </span><br><span class="line"># 读取测试数据并提取特征  </span><br><span class="line">test_data = pd.read_excel(&#x27;附件3AE.xlsx&#x27;, engine=&#x27;openpyxl&#x27;, sheet_name=&#x27;时间段1&#x27;)  </span><br><span class="line">full_test_df = process_wavelet_features(test_data)  </span><br><span class="line">  </span><br><span class="line"># 准备测试集  </span><br><span class="line">X_test = full_test_df.drop([&#x27;时间 (time)&#x27;], axis=1).values  </span><br><span class="line">X_test = torch.tensor(X_test, dtype=torch.float32)  </span><br><span class="line">  </span><br><span class="line"># 预测测试集  </span><br><span class="line">with torch.no_grad():  </span><br><span class="line">    output_probabilities = torch.exp(model(X_test))  </span><br><span class="line">  </span><br><span class="line"># 获取最后一个时间点的概率  </span><br><span class="line">last_time_prob = output_probabilities[-1]  </span><br><span class="line">  </span><br><span class="line"># 输出最后一个时间点的预测概率  </span><br><span class="line">print(f&#x27;最后一个时间点的预测概率: &#123;last_time_prob.numpy()&#125;&#x27;)  </span><br><span class="line"></span><br><span class="line"># 假设模型已被训练并保存在变量 model 中  </span><br><span class="line">model.eval()  </span><br><span class="line">  </span><br><span class="line"># 读取测试数据并提取特征  </span><br><span class="line">test_data = pd.read_excel(&#x27;附件3AE.xlsx&#x27;, engine=&#x27;openpyxl&#x27;, sheet_name=&#x27;时间段2&#x27;)  </span><br><span class="line">full_test_df = process_wavelet_features(test_data)  </span><br><span class="line">  </span><br><span class="line"># 准备测试集  </span><br><span class="line">X_test = full_test_df.drop([&#x27;时间 (time)&#x27;], axis=1).values  </span><br><span class="line">X_test = torch.tensor(X_test, dtype=torch.float32)  </span><br><span class="line">  </span><br><span class="line"># 预测测试集  </span><br><span class="line">with torch.no_grad():  </span><br><span class="line">    output_probabilities = torch.exp(model(X_test))  </span><br><span class="line">  </span><br><span class="line"># 获取最后一个时间点的概率  </span><br><span class="line">last_time_prob = output_probabilities[-1]  </span><br><span class="line">  </span><br><span class="line"># 输出最后一个时间点的预测概率  </span><br><
